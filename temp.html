<html>
<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.2/jquery.min.js" type="text/javascript" charset="utf-8"></script></script>
<script src="raphael-2.1.4.min.js"></script>
<script src="justgage.js"></script>

<script>
var accessToken = "9e444f31e39df1747e1495f4c15a3ebe22ffaba4";
var deviceID = "0a10aced202194944a0b03b4"
var url = "https://api.particle.io/v1/devices/0a10aced202194944a0b03b4/grados?access_token=9e444f31e39df1747e1495f4c15a3ebe22ffaba4";
function callback(data, status){
	if (status == "success") {
		temp = parseFloat(data.result);
		temp = temp.toFixed(2);
		g.refresh(temp);
		setTimeout(getReading, 1000);
	}
	else {
		alert("There was a problem");
	}
}
function getReading(){
   	$.get(url, {access_token: accessToken}, callback);
}
</script>
</head>	

<body>
<div id="gauge" class="200x160px"></div>

<script>
var g = new JustGage({
    id: "gauge",
    value: 0,
    min: 0,
    max: 400,
    title: "Temperatura (C)"
});
getReading();
</script>

</body>
